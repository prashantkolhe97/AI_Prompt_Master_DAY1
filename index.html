    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .light .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(108, 99, 255, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(108, 99, 255, 0.4);
            box-shadow: 0 12px 30px -10px rgba(108, 99, 255, 0.25);
        }
        .light .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(108, 99, 255, 0.15);
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
        }
        .light .glass-card:hover {
            border-color: rgba(108, 99, 255, 0.5);
            box-shadow: 0 12px 30px -10px rgba(108, 99, 255, 0.15);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: #6C63FF;
            border-radius: 10px;
        }
        /* Animation keyframes */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }

        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }

        .neon-glow-primary {
            box-shadow: 0 0 15px rgba(108, 99, 255, 0.4);
        }
        .neon-glow-secondary {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body class="bg-[#050515] text-slate-100 min-h-screen relative transition-colors duration-300">

    <!-- Global Sound Toggle & Theme Toggle -->
    <div class="fixed bottom-6 right-6 z-50 flex items-center gap-3">
        <button id="sound-toggle" onclick="toggleSound()" class="p-3 rounded-full glass hover:bg-primary/20 text-slate-300 transition-all shadow-lg" title="Toggle Sound Effects">

            <i data-lucide="moon" id="theme-icon-dark" class="w-5 h-5 text-primary"></i>
        </button>
    </div>

    <!-- Live XP Notification toast -->
    <div id="xp-toast" class="fixed top-24 right-6 z-50 transform translate-x-72 opacity-0 transition-all duration-500 ease-out flex items-center gap-3 bg-slate-900/90 border border-secondary/30 backdrop-blur px-4 py-3 rounded-xl shadow-2xl">
        <div class="p-2 bg-secondary/10 rounded-lg text-secondary">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
        </div>
        <div>
            <div class="text-xs text-slate-400">XP Gained!</div>
            <div class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-secondary to-primary" id="xp-toast-amount">+20 XP</div>
        </div>
    </div>

    <!-- Layout Wrapper -->
    <div class="relative z-10 flex flex-col min-h-screen">

        <!-- Top Header Navigation -->
        <header class="glass sticky top-0 z-40 px-4 md:px-8 py-3 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 rounded-xl bg-gradient-to-tr from-primary to-secondary text-white shadow-lg shadow-primary/25 animate-pulse-slow">
                    <i data-lucide="brain-circuit" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-100 to-secondary dark:from-white dark:via-slate-200 dark:to-secondary">
                        AI Prompt Master
                    </h1>
                    <p class="text-[10px] md:text-xs text-secondary font-semibold uppercase tracking-widest">Day 1: Mission Partner</p>
                </div>
            </div>

            <!-- Gamified Status Stats -->
            <div class="flex items-center gap-3 md:gap-6 flex-wrap">
                <!-- Progress & XP -->
                <div class="flex items-center gap-4 bg-slate-950/40 dark:bg-slate-950/60 py-1.5 px-3 rounded-xl border border-white/5">
                    <div class="text-center">
                        <div class="text-[9px] uppercase tracking-wider text-slate-400 font-bold">Level</div>
                        <div id="level-display" class="font-extrabold text-accent text-sm md:text-base">1</div>
                    </div>
                    <div class="h-8 w-[1px] bg-white/10"></div>
                    <div class="text-center">
                        <div class="text-[9px] uppercase tracking-wider text-slate-400 font-bold">Total XP</div>
                        <div id="xp-display" class="font-extrabold text-secondary text-sm md:text-base">0 / 400</div>
                    </div>
                </div>

                <!-- Badges Shelf preview -->
                <div class="hidden md:flex items-center gap-2" id="badge-shelf-header">
                    <!-- Badges will be appended here dynamically -->
                </div>
            </div>
        </header>

        <!-- Main Body Grid Layout -->
        <div class="flex-grow flex flex-col lg:flex-row">

            <!-- Responsive Progress Sidebar -->
            <aside class="lg:w-72 glass border-r border-white/5 lg:sticky lg:top-[73px] lg:h-[calc(100vh-73px)] overflow-y-auto p-4 z-30 flex lg:flex-col gap-3 lg:gap-4 flex-row snap-x overflow-x-auto w-full">
                <div class="lg:block hidden mb-2">
                    <h3 class="text-xs uppercase tracking-widest font-bold text-slate-400 mb-2">Mission Milestones</h3>
                    <div class="w-full bg-slate-900 dark:bg-slate-900/50 rounded-full h-1.5 overflow-hidden">
                        <div id="sidebar-progress-bar" class="bg-gradient-to-r from-primary to-secondary h-full transition-all duration-500 w-0"></div>

                <div class="flex lg:flex-col gap-2 min-w-max lg:min-w-0 w-full" id="mission-steps-list">

            <!-- Learning Content Area -->
            <main class="flex-grow p-4 md:p-8 flex flex-col items-center justify-start max-w-5xl mx-auto w-full relative">
                
                <div id="slide-container" class="w-full transition-all duration-500 transform opacity-100 translate-y-0 min-h-[70vh] flex flex-col justify-between">

                </div>

        </div>

        <!-- Footer -->
        <footer class="glass border-t border-white/5 text-center py-4 text-xs text-slate-400 z-10 flex flex-col sm:flex-row justify-between items-center px-8 gap-2">
            <div>
                &copy; 2026 <span class="text-secondary font-bold">AI Prompt Master</span> Academy. All rights Reserved.
            </div>
            <div class="flex gap-4 items-center">
                <span>Designed for BCA, BCS, Engineering & Tech Undergraduates</span>
                <span class="text-accent flex items-center gap-1"><i data-lucide="zap" class="w-3.5 h-3.5"></i> Mission System Active</span>
            </div>
        </footer>

    </div>

    <!-- Templates & JS Logic -->
    <script>
        // Sound toggle and synthesizer state
        let soundEnabled = true;
        let isDarkMode = true;

        // Custom Sound Generator using Web Audio API to prevent broken external asset links
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration) {
            if (!soundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {
                console.log("Audio not allowed yet by user interaction");
            }
        }

        function playSound(style) {
            if (style === 'success') {
                playTone(523.25, 'triangle', 0.15); // C5
                setTimeout(() => playTone(659.25, 'triangle', 0.2), 100); // E5
            } else if (style === 'fail') {
                playTone(220, 'sawtooth', 0.3); // A3 buzz
            } else if (style === 'badge') {
                // Celebration chord
                playTone(261.63, 'sine', 0.1); // C4
                setTimeout(() => playTone(329.63, 'sine', 0.1), 80); // E4
                setTimeout(() => playTone(392.00, 'sine', 0.1), 160); // G4
                setTimeout(() => playTone(523.25, 'sine', 0.3), 240); // C5
            } else if (style === 'click') {
                playTone(440, 'sine', 0.05); // A4 tap
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const soundIcon = document.getElementById('sound-icon');
            if (soundEnabled) {
                soundIcon.setAttribute('data-lucide', 'volume-2');
                soundIcon.classList.add('text-secondary');
                soundIcon.classList.remove('text-slate-500');
            } else {
                soundIcon.setAttribute('data-lucide', 'volume-x');
                soundIcon.classList.remove('text-secondary');
                soundIcon.classList.add('text-slate-500');
            }
            lucide.createIcons();
            playSound('click');
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const body = document.body;
            const html = document.documentElement;
            const iconDark = document.getElementById('theme-icon-dark');
            const iconLight = document.getElementById('theme-icon-light');

            if (isDarkMode) {
                html.classList.add('dark');
                body.classList.add('bg-[#050515]');
                body.classList.remove('bg-slate-50', 'text-slate-800');
                body.classList.add('text-slate-100');
                iconDark.classList.remove('hidden');
                iconLight.classList.add('hidden');
            } else {
                html.classList.remove('dark');
                body.classList.remove('bg-[#050515]');
                body.classList.add('bg-slate-50', 'text-slate-800');
                body.classList.remove('text-slate-100');
                iconDark.classList.add('hidden');
                iconLight.classList.remove('hidden');
            }
            playSound('click');
        }

        // Global gamified state
        const appState = {
            xp: 0,
            level: 1,
            unlockedBadges: [],
            completedSteps: {}, // Tracks step indices completed
            currentStep: 0,
            userName: '',
            userCourse: '',
            wordCloud: [
                { text: 'ChatGPT', weight: 8 },
                { text: 'Future', weight: 6 },
                { text: 'Robot', weight: 5 },
                { text: 'Technology', weight: 7 },
                { text: 'Jobs', weight: 4 },
                { text: 'Coding', weight: 5 },
                { text: 'Incredible', weight: 3 }
            ],
            userWordSubmitted: false,
            icebreakerSubmitted: false,
            icebreakerTimer: 30,
            icebreakerTimerInterval: null,
            pollSelected: null,
            quizAnswers: {},
            promptA_improved: false,
            promptsRewritten: {
                python: '',
                networking: '',
                notes: '',
                assignment: ''
            },
            promptEvaluations: {
                python: { score: 0, feedback: 'Not submitted' },
                networking: { score: 0, feedback: 'Not submitted' },
                notes: { score: 0, feedback: 'Not submitted' },
                assignment: { score: 0, feedback: 'Not submitted' }
            },
            teaSelection: {
                type: 'standard',
                sugar: 'medium',
                milk: 'yes',
                cups: 2,
                audience: 'guests'
            },
            selectedToolIndex: 0,
            toolMatching: {
                matches: {}, // maps taskId to toolId
                checked: false,
                isCorrect: false
            },
            capabilitiesAnswers: {},
            capabilitiesChecked: false,
            factCheckAnswers: {},
            treasureHuntSelection: 'timetable',
            treasureHuntSubmission: '',
            treasureHuntEvaluated: false,
            treasureHuntScore: 0,
            reflectionData: {
                learned: ['', '', ''],
                tools: ['', ''],
                useCase: ''
            }
        };

        const badgeDatabase = {
            'ai_explorer': { id: 'ai_explorer', title: 'AI Explorer', icon: 'compass', desc: 'Started your prompt engineering journey', color: 'text-primary border-primary/40 bg-primary/10' },
            'prompt_detective': { id: 'prompt_detective', title: 'Prompt Detective', icon: 'search', desc: 'Mastered standard vs. detailed prompts', color: 'text-secondary border-secondary/40 bg-secondary/10' },
            'generative_genius': { id: 'generative_genius', title: 'Generative Genius', icon: 'palette', desc: 'Discovered generative pattern control', color: 'text-accent border-accent/40 bg-accent/10' },
            'tool_master': { id: 'tool_master', title: 'Tool Master', icon: 'wrench', desc: 'Selected the perfect AI models for work', color: 'text-success border-success/40 bg-success/10' },
            'smart_verifier': { id: 'smart_verifier', title: 'Smart Verifier', icon: 'shield-check', desc: 'Identified and debunked hallucinations', color: 'text-purple-400 border-purple-400/40 bg-purple-400/10' },
            'treasure_hunter': { id: 'treasure_hunter', title: 'Treasure Hunter', icon: 'gem', desc: 'Crafted custom expert study assets', color: 'text-pink-400 border-pink-400/40 bg-pink-400/10' }
        };

        const milestones = [
            { id: 0, title: 'Hero Launch', duration: 'Landing' },
            { id: 1, title: 'Welcome Wall', duration: '0-10m' },
            { id: 2, title: 'Icebreaker Activity', duration: '30s Quiz' },
            { id: 3, title: '1. What is AI?', duration: '10-25m' },
            { id: 4, title: '2. Generative AI', duration: '25-40m' },
            { id: 5, title: '3. What is a Prompt?', duration: '40-60m' },
            { id: 6, title: '4. Why Prompts Matter', duration: '60-75m' },
            { id: 7, title: '5. AI Tools Showcase', duration: '75-95m' },
            { id: 8, title: '6. AI Capabilities', duration: '95-110m' },
            { id: 9, title: 'AI Treasure Hunt', duration: '110-117m' },
            { id: 10, title: 'Mission Reflection', duration: '117-120m' },
            { id: 11, title: 'Graduation Day 1', duration: 'End' }
        ];

        // Background canvas neural net animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = isDarkMode ? 'rgba(108, 99, 255, 0.3)' : 'rgba(108, 99, 255, 0.15)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            // Draw lines between nearby particles
            ctx.strokeStyle = isDarkMode ? 'rgba(108, 99, 255, 0.08)' : 'rgba(108, 99, 255, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // UI Gamified Systems
        function addXP(amount) {
            appState.xp += amount;
            
            // Recalculate level
            const newLevel = Math.floor(appState.xp / 150) + 1;
            if (newLevel > appState.level) {
                appState.level = newLevel;
                playSound('badge');
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6 }
                });
            } else {
                playSound('success');
            }

            // Update UI elements
            updateXPDisplay();
            showXpToast(amount);
        }

        function showXpToast(amount) {
            const toast = document.getElementById('xp-toast');
            const toastAmount = document.getElementById('xp-toast-amount');
            toastAmount.textContent = `+${amount} XP`;
            toast.classList.remove('translate-x-72', 'opacity-0');
            toast.classList.add('translate-x-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-x-72', 'opacity-0');
                toast.classList.remove('translate-x-0', 'opacity-100');
            }, 3000);
        }

        function unlockBadge(badgeId) {
            if (!appState.unlockedBadges.includes(badgeId)) {
                appState.unlockedBadges.push(badgeId);
                playSound('badge');
                confetti({
                    particleCount: 80,
                    spread: 60,
                    colors: ['#6C63FF', '#00D4FF', '#FFB703']
                });
                renderBadgeShelf();
                addXP(50); // Earning a badge grants 50 bonus XP
            }
        }

        function updateXPDisplay() {
            const xpDisplay = document.getElementById('xp-display');
            const levelDisplay = document.getElementById('level-display');
            
            levelDisplay.textContent = appState.level;
            xpDisplay.textContent = `${appState.xp} XP`;
        }

        function renderBadgeShelf() {
            const shelf = document.getElementById('badge-shelf-header');
            shelf.innerHTML = '';
            appState.unlockedBadges.forEach(badgeId => {
                const b = badgeDatabase[badgeId];
                if (b) {
                    const iconEl = document.createElement('div');
                    iconEl.className = `p-1.5 rounded-lg border ${b.color} cursor-pointer hover:scale-110 transition-transform shadow-md`;
                    iconEl.setAttribute('title', `${b.title} Badge: ${b.desc}`);
                    iconEl.innerHTML = `<i data-lucide="${b.icon}" class="w-4 h-4"></i>`;
                    shelf.appendChild(iconEl);
                }
            });
            lucide.createIcons();
        }

        function renderSidebarProgress() {
            const totalSteps = milestones.length;
            const completedCount = Object.keys(appState.completedSteps).length;
            const percentage = Math.round((completedCount / totalSteps) * 100);

            document.getElementById('sidebar-progress-bar').style.width = `${percentage}%`;
            document.getElementById('sidebar-percentage').textContent = `${percentage}% Complete`;
            document.getElementById('sidebar-completed-count').textContent = `${completedCount}/${totalSteps} Steps`;
        }

        function renderSidebar() {
            const listContainer = document.getElementById('mission-steps-list');
            listContainer.innerHTML = '';

            milestones.forEach((m, idx) => {
                const isCurrent = appState.currentStep === idx;
                const isCompleted = appState.completedSteps[idx];

                let stepClass = 'flex items-center gap-3 p-3 rounded-xl transition-all cursor-pointer text-left ';
                let indicatorClass = 'w-2.5 h-2.5 rounded-full ';

                if (isCurrent) {
                    stepClass += 'bg-primary/20 text-white font-semibold border-l-4 border-secondary shadow-lg';
                    indicatorClass += 'bg-secondary animate-ping';
                } else if (isCompleted) {
                    stepClass += 'text-emerald-400 hover:bg-slate-900/30 dark:hover:bg-slate-900/40';
                    indicatorClass += 'bg-emerald-500';
                } else {
                    stepClass += 'text-slate-400 hover:bg-slate-900/30 hover:text-slate-200';
                    indicatorClass += 'bg-slate-700';
                }

                const item = document.createElement('button');
                item.className = stepClass;
                item.onclick = () => {
                    playSound('click');
                    navigateToStep(idx);
                };
                item.innerHTML = `
                    <div class="flex items-center gap-2.5">
                        <div class="${indicatorClass}"></div>
                        <div>
                            <div class="text-xs font-bold leading-none">${m.title}</div>
                            <div class="text-[9px] text-slate-500 mt-1">${m.duration}</div>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
            renderSidebarProgress();
        }

        function navigateToStep(stepIndex) {
            // Animate transition
            const container = document.getElementById('slide-container');
            container.classList.add('opacity-0', 'translate-y-4');
            
            setTimeout(() => {
                appState.currentStep = stepIndex;
                appState.completedSteps[stepIndex] = true;
                
                renderSlide();
                renderSidebar();
                
                container.classList.remove('opacity-0', 'translate-y-4');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        // SLIDES DATA AND RENDERERS
        function renderSlide() {
            const container = document.getElementById('slide-container');
            let contentHtml = '';

            switch (appState.currentStep) {
                case 0: // Hero Launch
                    contentHtml = getHeroTemplate();
                    break;
                case 1: // Welcome Wall (0-10 Min)
                    contentHtml = getWelcomeWallTemplate();
                    break;
                case 2: // Icebreaker (AI Around Us)
                    contentHtml = getIcebreakerTemplate();
                    // Start icebreaker timer if not already submitted
                    if (!appState.icebreakerSubmitted) {
                        startIcebreakerTimer();
                    }
                    break;

        function runPromptEvaluation() {
            const promptInput = document.getElementById('editor-improved-prompt').value.trim();
            if (promptInput.length < 15) {
                playSound('fail');
                alert("Prompt is too brief. Try including target audience, style templates, and format indicators.");
                return;
            }

            // Simple algorithmic structure evaluator
            let score = 40;
            let tips = [];

            // Check for keywords indicating high prompt engineering structure
            if (promptInput.toLowerCase().includes('bca') || promptInput.toLowerCase().includes('student') || promptInput.toLowerCase().includes('beginner')) {
                score += 15;
            } else {
                tips.push("Add a specific audience context (e.g. 'for first-year BCA students').");
            }

            if (promptInput.toLowerCase().includes('format') || promptInput.toLowerCase().includes('table') || promptInput.toLowerCase().includes('bullet') || promptInput.toLowerCase().includes('summary')) {
                score += 15;
            } else {
                tips.push("Specify your target output format structure (e.g. 'include a summary table' or 'use structured bullet points').");
            }

            if (promptInput.toLowerCase().includes('example') || promptInput.toLowerCase().includes('analogy') || promptInput.toLowerCase().includes('scenario')) {
                score += 15;
            } else {
                tips.push("Ask the model to explain using analogies or real-world scenarios.");
            }

            if (promptInput.length > 80) {
                score += 15;
            }

            score = Math.min(score, 100);

            // Save results to appState
            appState.promptsRewritten[selectedChallengeTopicId] = promptInput;
            appState.promptEvaluations[selectedChallengeTopicId] = {
                score: score,
                feedback: tips.length > 0 ? `Good start! Try this for full marks: ${tips.join(' ')}` : "Excellent job! Your prompt is highly structured and professional."
            };

            // Display
            const resultPanel = document.getElementById('evaluation-result-panel');
            const header = document.getElementById('eval-header');
            const scoreDisplay = document.getElementById('eval-score');
            const progress = document.getElementById('eval-progress');
            const feedback = document.getElementById('eval-feedback');

            resultPanel.classList.remove('hidden');
            scoreDisplay.textContent = `${score}/100`;
            progress.style.width = `${score}%`;

                                    <strong>Hallucination Demo:</strong> AI output claiming "Standard SQL has a specific command called <code>_EXTRACT_ALL_METRICS</code>" (No such command exists!).
                                </div>
                                <span class="block text-xs font-bold text-accent mt-3 uppercase tracking-wider">💡 Key Lesson: Always verify critical facts!</span>

                        </div>
                    </div>

                    <!-- Fact Check Challenge -->
                    <div class="glass-card p-6 rounded-2xl">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="shield-check" class="text-emerald-400 w-5 h-5"></i> Fact Check Challenge</h3>

                        <div class="space-y-4">
                            <!-- Challenge Item 1 -->
                            <div class="p-4 bg-slate-900/40 rounded-xl border border-white/5 flex flex-wrap justify-between items-center gap-4">
                                <div>
                                    <strong class="text-xs text-slate-300">Statement A:</strong>
                                    <p class="text-xs text-slate-400 italic mt-1">"The Java JDK package has an official core utility called 'System.mathCore' for high-precision calculations."</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="factCheck('item-a', 'verify')" id="btn-fact-a-verify" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold">VERIFY</button>
                                    <button onclick="factCheck('item-a', 'correct')" id="btn-fact-a-correct" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold">CORRECT</button>
                                </div>
                            </div>
                            <div id="fact-a-feedback" class="hidden text-xs text-slate-400 bg-slate-950/50 p-2.5 rounded border border-white/5">
                                <strong>Explanation:</strong> This is a standard hallucination. Java uses <code>java.lang.Math</code>. There is no core JDK library named 'System.mathCore'. Always verify!
                            </div>

                            <!-- Challenge Item 2 -->
                            <div class="p-4 bg-slate-900/40 rounded-xl border border-white/5 flex flex-wrap justify-between items-center gap-4">
                                <div>
                                    <strong class="text-xs text-slate-300">Statement B:</strong>
                                    <p class="text-xs text-slate-400 italic mt-1">"HTTP stands for Hypertext Transfer Protocol and is the foundation of data communication on the web."</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="factCheck('item-b', 'verify')" id="btn-fact-b-verify" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold">VERIFY</button>
                                    <button onclick="factCheck('item-b', 'correct')" id="btn-fact-b-correct" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold">CORRECT</button>
                                </div>
                            </div>
                            <div id="fact-b-feedback" class="hidden text-xs text-slate-400 bg-slate-950/50 p-2.5 rounded border border-white/5">
                                <strong>Explanation:</strong> This is factual and correct.

                        </button>
                    </div>
                </div>

        }

        function capAnswer(key, isAllowed) {
            const btn = document.getElementById(`btn-cap-${key}-${isAllowed ? 'yes' : 'no'}`);
            btn.className = "px-3 py-1 bg-emerald-500 text-white text-xs font-black rounded-lg shadow-lg shadow-emerald-500/20 animate-pulse";
            playSound('success');
            addXP(10);
        }

        function factCheck(itemId, action) {
            const correctActions = {
                'item-a': 'verify',
                'item-b': 'correct'
            };

            const isCorrect = correctActions[itemId] === action;
            const btnVerify = document.getElementById(`btn-fact-${itemId === 'item-a' ? 'a' : 'b'}-verify`);
            const btnCorrect = document.getElementById(`btn-fact-${itemId === 'item-a' ? 'a' : 'b'}-correct`);
            const feedbackPanel = document.getElementById(`fact-${itemId === 'item-a' ? 'a' : 'b'}-feedback`);

            feedbackPanel.classList.remove('hidden');

            if (isCorrect) {
                playSound('success');
                if (action === 'verify') {
                    btnVerify.className = "px-3 py-1.5 bg-emerald-500 text-white rounded-lg text-xs font-black shadow-lg shadow-emerald-500/20";
                    btnCorrect.className = "px-3 py-1.5 bg-slate-800/20 text-slate-600 rounded-lg text-xs font-bold";
                } else {
                    btnCorrect.className = "px-3 py-1.5 bg-emerald-500 text-white rounded-lg text-xs font-black shadow-lg shadow-emerald-500/20";
                    btnVerify.className = "px-3 py-1.5 bg-slate-800/20 text-slate-600 rounded-lg text-xs font-bold";
                }

                if (!appState.factCheckAnswers[itemId]) {
                    appState.factCheckAnswers[itemId] = true;
                    addXP(20);
                }
                unlockBadge('smart_verifier');
            } else {
                playSound('fail');
                if (action === 'verify') {
                    btnVerify.className = "px-3 py-1.5 bg-red-500 text-white rounded-lg text-xs font-bold";
                } else {
                    btnCorrect.className = "px-3 py-1.5 bg-red-500 text-white rounded-lg text-xs font-bold";
                }
            }
        }

        // TREASURE HUNT (STEP 9)
        function getTreasureHuntTemplate() {

                { id: 'quote', title: 'Generate Motivational Quote', desc: 'Formulate highly personalized motivational tips for BCA students.' }

                                <button onclick="selectHuntChallenge('${c.id}')" class="p-3 text-left rounded-xl border text-xs transition-all ${c.id === appState.treasureHuntSelection ? 'bg-accent/20 border-accent text-white font-extrabold shadow-lg shadow-accent/10' : 'bg-slate-900 border-white/5 hover:border-slate-400'}">
                                    ${c.title}
                                </button>
                            `).join('')}
                        </div>

                        <!-- Active Challenge Workspace -->
                        <div class="p-5 bg-slate-950/60 rounded-xl border border-white/10 space-y-4">
                            <div>
                                <span class="text-[10px] uppercase font-black text-accent tracking-widest block mb-1">Active Target</span>

                                <p class="text-xs text-slate-400 mt-1">${activeChallenge.desc}</p>
                            </div>

                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Your Expert Prompt Design:</label>
                                <textarea id="hunt-prompt-input" placeholder="e.g. You are an expert academic counselor. Design a highly detailed 14-day study timetable for a BCA student preparing for Data Structures exams. Allocate blocks of 2 hours, incorporate rest cycles, and format as a clean Markdown table." class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-accent text-xs h-32 resize-none">${appState.treasureHuntSubmission}</textarea>
                            </div>

                            <button onclick="evaluateTreasureHunt()" class="bg-accent text-slate-950 font-black px-6 py-3 rounded-xl hover:scale-105 transition-all text-xs flex items-center gap-2">
                                <i data-lucide="gem" class="w-4 h-4"></i> Submit Prompt Study Asset
                            </button>

                            <!-- Score display -->
                            <div id="hunt-evaluation-box" class="${appState.treasureHuntEvaluated ? 'block' : 'hidden'} p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-xl">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-xs font-bold uppercase text-emerald-400">Structure Rating Secured!</span>
                                    <span class="text-lg font-black text-emerald-400">${appState.treasureHuntScore}/100</span>
                                </div>
                                <p class="text-xs text-slate-300">
                                    Outstanding structural work! Your prompt design includes distinct roles, target subjects, timeline parameters, and requested structural outputs. You have unlocked the **Treasure Hunter Badge**!
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-4">
                        <button onclick="navigateToStep(8)" class="text-xs text-slate-500 hover:text-slate-300">Back</button>
                        <button onclick="navigateToStep(10)" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-6 py-3 rounded-xl transition-all flex items-center gap-2 text-sm">
                            Next Mission <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectHuntChallenge(id) {
            playSound('click');

            renderSlide();
        }

        function evaluateTreasureHunt() {
            const promptStr = document.getElementById('hunt-prompt-input').value.trim();
            if (promptStr.length < 20) {
                playSound('fail');
                alert("Prompt structure is too light. Include clear academic objectives to continue!");
                return;
            }

            appState.treasureHuntSubmission = promptStr;
            appState.treasureHuntEvaluated = true;
            appState.treasureHuntScore = 95; // Simulated high score for design effort
            
            addXP(50);
            unlockBadge('treasure_hunter');
            renderSlide();
        }

                        </button>
                    </div>
                </div>
            `;
        }

        function submitReflection() {

                document.getElementById('ref-learned-0').value.trim(),
                document.getElementById('ref-learned-1').value.trim(),
                document.getElementById('ref-learned-2').value.trim()
            ];

                document.getElementById('ref-tools-1').value.trim()
            ];

                playSound('fail');
                alert("Please fill out at least one item from each reflection tier!");
                return;

            appState.reflectionData = { learned, tools, useCase };
            addXP(30);
            navigateToStep(11);
        }

                        <h3 class="text-lg font-black mt-3">The Secret Behind Getting Amazing AI Outputs: Smart Prompt Writing</h3>
                        <p class="text-xs text-slate-400 mt-1 leading-relaxed">
                            Tomorrow, we transition from baseline explorers to architect-level creators. Discover the secret prompts that get professional level grades, summarize 20-page papers instantly, and build complete software applications from simple concept instructions.
                        </p>

                        <!-- Pulse element to build excitement -->
                        <div class="mt-4 flex items-center gap-2 text-xs font-bold text-secondary animate-pulse">
                            <i data-lucide="sparkles" class="w-4 h-4 animate-spin"></i> Core Mission Unlocks Tomorrow at 09:00 AM!

                    </div>

        // Initialize App
        window.onload = function() {
            renderSlide();
            renderSidebar();
            updateXPDisplay();
            renderBadgeShelf();
        };
    </script>
